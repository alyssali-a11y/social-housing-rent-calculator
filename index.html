<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>社宅五期租金試算</title>
  <script src="./rent-data.js"></script>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-2: #f9fafb;
      --text: #172033;
      --muted: #667085;
      --line: #d9dee7;
      --primary: #175cd3;
      --primary-soft: #eff6ff;
      --ok: #067647;
      --ok-soft: #ecfdf3;
      --warn: #b54708;
      --warn-soft: #fffaeb;
      --bad: #b42318;
      --bad-soft: #fef3f2;
      --shadow: 0 10px 30px rgba(16, 24, 40, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      line-height: 1.55;
      overflow-x: hidden;
    }

    button, input, select {
      font: inherit;
    }

    .app {
      width: 100%;
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px;
      overflow-x: hidden;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .topbar > * {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .source {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .btn {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      padding: 8px 12px;
      cursor: pointer;
      transition: .16s ease;
    }

    .btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .btn.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
      font-weight: 700;
    }

    .btn.primary:hover {
      color: #fff;
      filter: brightness(.96);
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(360px, 520px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      min-width: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    .panel-body {
      padding: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    fieldset.field {
      min-width: 0;
      margin: 0;
      padding: 0;
      border: 0;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label,
    legend {
      color: #344054;
      font-size: 14px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid #cfd6e2;
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 9px 11px;
      outline: none;
    }

    input:focus,
    select:focus,
    button:focus-visible {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(23, 92, 211, .18);
    }

    .segmented {
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .segmented input,
    .check-list input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .segmented span,
    .check-list span {
      display: grid;
      place-items: center;
      min-height: 44px;
      min-width: 0;
      border: 1px solid #cfd6e2;
      border-radius: 8px;
      background: #fff;
      color: #344054;
      cursor: pointer;
      transition: .16s ease;
    }

    .segmented input:checked + span,
    .check-list input:checked + span {
      border-color: var(--primary);
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 700;
    }

    .check-list {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      grid-column: 1 / -1;
      padding-top: 4px;
    }

    .status {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      align-items: center;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      margin-bottom: 16px;
    }

    .status.ok { background: var(--ok-soft); border-color: #abefc6; }
    .status.warn { background: var(--warn-soft); border-color: #fedf89; }
    .status.bad { background: var(--bad-soft); border-color: #fecdca; }

    .status h2 {
      margin: 0;
      font-size: 22px;
    }

    .status p {
      margin: 2px 0 0;
      color: var(--muted);
    }

    .badge {
      border-radius: 999px;
      padding: 6px 10px;
      background: #fff;
      border: 1px solid var(--line);
      font-weight: 700;
      white-space: nowrap;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .metric {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      min-height: 92px;
    }

    .metric small {
      display: block;
      color: var(--muted);
      font-weight: 700;
    }

    .metric strong {
      display: block;
      margin-top: 8px;
      font-size: 22px;
      font-variant-numeric: tabular-nums;
      overflow-wrap: anywhere;
    }

    .split {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .compare-column {
      min-width: 0;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .compare-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #344054;
      font-size: 14px;
      font-weight: 700;
    }

    .compare-label span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .calc-card {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .calc-card.active {
      border-color: var(--primary);
      box-shadow: inset 4px 0 0 var(--primary);
    }

    .calc-card h3 {
      margin: 0;
      padding: 12px 14px;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
      font-size: 16px;
    }

    .rows {
      padding: 10px 14px 14px;
    }

    .line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, auto);
      gap: 12px;
      padding: 7px 0;
      border-bottom: 1px solid #eef1f5;
      min-width: 0;
    }

    .line:last-child {
      border-bottom: 0;
    }

    .line span:first-child {
      color: var(--muted);
    }

    .line strong {
      font-variant-numeric: tabular-nums;
      overflow-wrap: anywhere;
      text-align: right;
    }

    .notes {
      margin-top: 14px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #344054;
    }

    .notes ul {
      margin: 8px 0 0;
      padding-left: 20px;
    }

    .notes li + li {
      margin-top: 4px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: .2s ease;
      background: #172033;
      color: #fff;
      border-radius: 8px;
      padding: 10px 12px;
      box-shadow: var(--shadow);
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1100px) {
      .grid,
      .split {
        grid-template-columns: 1fr;
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .app {
        padding: 14px;
      }

      .topbar,
      .status {
        display: grid;
      }

      .form-grid,
      .metrics,
      .check-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>社宅五期租金試算</h1>
        <p class="source" id="sourceText"></p>
      </div>
      <div class="actions">
        <button class="btn" id="clearBtn" type="button">清空</button>
        <button class="btn" id="copyBtn" type="button">複製明細</button>
        <button class="btn" id="printBtn" type="button">列印</button>
      </div>
    </header>

    <section class="grid">
      <form class="panel" id="rentForm">
        <div class="panel-header">
          <h2 class="panel-title">物件資料</h2>
        </div>
        <div class="panel-body">
          <div class="form-grid">
            <fieldset class="field">
              <legend>案件類型</legend>
              <div class="segmented">
                <label><input type="radio" name="type" value="whole"><span>整層住宅</span></label>
                <label><input type="radio" name="type" value="suite"><span>獨立套房</span></label>
              </div>
            </fieldset>
            <div class="field">
              <label for="city">縣市</label>
              <select id="city"></select>
            </div>
            <div class="field">
              <label for="district">行政區</label>
              <select id="district"></select>
            </div>
            <div class="field full">
              <label for="address">詳細地址</label>
              <input id="address" autocomplete="street-address" placeholder="請輸入路段、巷弄、門牌、樓層">
            </div>
            <div class="field">
              <label for="area">權狀坪數</label>
              <input id="area" type="number" min="0" step="0.01">
            </div>
            <div class="field">
              <label for="rent">簽約租金總價</label>
              <input id="rent" type="number" min="0" step="1">
            </div>
            <div class="field">
              <label for="age">屋齡</label>
              <input id="age" type="number" min="0" step="1">
            </div>
            <div class="field">
              <label for="location">案件地點等級</label>
              <select id="location"></select>
            </div>
            <div class="field">
              <label for="renovation">裝潢等級</label>
              <select id="renovation"></select>
            </div>
            <div class="field">
              <label for="equipmentValue">設備調整值</label>
              <input id="equipmentValue" type="number" min="0" step="100" readonly>
            </div>
            <fieldset class="field full">
              <legend>優質設備</legend>
              <div class="check-list" id="equipmentList"></div>
              <p class="hint">每項以 500 元估算，整層住宅最高 2,000 元，獨立套房最高 1,000 元。</p>
            </fieldset>
            <div class="form-actions">
              <button class="btn primary" type="submit">送出</button>
            </div>
          </div>
        </div>
      </form>

      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title">判斷結果</h2>
          <span class="badge" id="modeBadge">一般審查</span>
        </div>
        <div class="panel-body">
          <div class="status" id="statusBox">
            <div>
              <h2 id="statusTitle">待輸入</h2>
              <p id="statusDesc"></p>
            </div>
          </div>

          <div class="metrics">
            <div class="metric">
              <small>實際單位租金</small>
              <strong id="actualUnit">-</strong>
            </div>
            <div class="metric">
              <small>原始單價參考值</small>
              <strong id="baseRate">-</strong>
            </div>
            <div class="metric">
              <small>可受理總租金</small>
              <strong id="allowedTotal">-</strong>
            </div>
            <div class="metric">
              <small>本件預計簽約租金</small>
              <strong id="plannedRent">-</strong>
            </div>
          </div>

          <div class="split" id="comparison"></div>

          <div class="notes">
            <strong>審查邏輯</strong>
            <ul id="ruleNotes"></ul>
          </div>
        </div>
      </section>
    </section>
  </main>

  <div class="toast" id="toast">已複製</div>

  <script>
    const DATA = window.RENT_DATA;
    const $ = (id) => document.getElementById(id);
    const money = (value) => Number.isFinite(value) ? `${Math.round(value).toLocaleString("zh-TW")} 元` : "-";
    const unit = (value) => Number.isFinite(value) ? `${Math.round(value).toLocaleString("zh-TW")} 元／坪` : "-";
    const percent = (value) => `${Math.round(value * 100)}%`;
    const typeLabel = { whole: "整層住宅", suite: "獨立套房" };
    let hasSubmittedResult = false;

    function unique(list) {
      return [...new Set(list)];
    }

    function selectedType() {
      return document.querySelector('input[name="type"]:checked')?.value || "";
    }

    function getNumber(id) {
      return Number($(id).value) || 0;
    }

    function ageKeyFor(row, age) {
      const keys = Object.keys(row.rates);
      if (age >= 40) return "40+";
      if (age >= 35 && keys.includes("35-40")) return "35-40";
      if (age >= 30 && keys.includes("30-35")) return "30-35";
      if (age >= 30 && keys.includes("30-40")) return "30-40";
      if (age >= 25) return "25-30";
      if (age >= 20) return "20-25";
      if (age >= 15) return "15-20";
      if (age >= 10) return "10-15";
      if (age >= 5) return "5-10";
      return "0-5";
    }

    function capFor(city, type) {
      const caps = DATA.cityCaps[city] || DATA.cityCaps["其他縣市"];
      return caps[type];
    }

    function findRow(city, district, type) {
      return DATA.rows.find((row) => row.city === city && row.district === district && row.buildingType === type)
        || DATA.rows.find((row) => row.city === city && row.district === "其他" && row.buildingType === type);
    }

    function equipmentValue(type) {
      if (!type) return 0;
      const count = [...document.querySelectorAll("[data-equipment]:checked")].length;
      const max = type === "whole" ? DATA.equipment.wholeMax : DATA.equipment.suiteMax;
      return Math.min(count * 500, max);
    }

    function updateEquipmentValue() {
      const type = selectedType();
      $("equipmentValue").value = type ? equipmentValue(type) : "";
    }

    function calcFor(type) {
      const city = $("city").value;
      const district = $("district").value;
      const area = getNumber("area");
      const age = getNumber("age");
      const locationRate = Number($("location").value);
      const renovationRate = Number($("renovation").value);
      const row = findRow(city, district, type);
      if (!row || area <= 0) return null;

      const bucket = ageKeyFor(row, age);
      const rate = row.rates[bucket];
      const base = rate * area;
      const locationAdd = base * locationRate;
      const renovationAdd = base * renovationRate;
      const equipmentAdd = equipmentValue(type);
      const calculated = Math.round(base + locationAdd + renovationAdd + equipmentAdd);
      const receiveCap = capFor(city, type);
      const allowedTotal = Math.min(calculated, receiveCap);
      const allowedUnit = allowedTotal / area;

      return {
        type,
        label: typeLabel[type],
        row,
        bucket,
        rate,
        base,
        locationRate,
        locationAdd,
        renovationRate,
        renovationAdd,
        equipmentAdd,
        calculated,
        receiveCap,
        allowedTotal,
        allowedUnit,
      };
    }

    function shouldUseFlexible(type, area) {
      return (type === "whole" && area > 0 && area < 15) || (type === "suite" && area >= 15);
    }

    function chooseStandard(normal, alternate, type, area) {
      if (!shouldUseFlexible(type, area) || !alternate) {
        return { selected: normal, mode: "一般審查", flexible: false };
      }
      const selected = alternate.allowedTotal > normal.allowedTotal ? alternate : normal;
      return { selected, mode: "彈性認定", flexible: true };
    }

    function renderCard(calc, selectedTypeForResult) {
      if (!calc) return "";
      const active = calc.type === selectedTypeForResult ? " active" : "";
      return `
        <article class="calc-card${active}">
          <h3>${calc.label}計算明細</h3>
          <div class="rows">
            <div class="line"><span>租金基數</span><strong>每坪 ${calc.rate.toLocaleString("zh-TW")} × ${getNumber("area").toFixed(2)} 坪 = ${money(calc.base)}</strong></div>
            <div class="line"><span>區位加乘</span><strong>${money(calc.base)} × ${percent(calc.locationRate)} = ${money(calc.locationAdd)}</strong></div>
            <div class="line"><span>裝修加乘</span><strong>${money(calc.base)} × ${percent(calc.renovationRate)} = ${money(calc.renovationAdd)}</strong></div>
            <div class="line"><span>優質設備</span><strong>${money(calc.equipmentAdd)}</strong></div>
            <div class="line"><span>單價計算上限</span><strong>${money(calc.calculated)}</strong></div>
            <div class="line"><span>總價收件上限</span><strong>${money(calc.receiveCap)}</strong></div>
            <div class="line"><span>${calc.label}租金上限</span><strong>${money(calc.allowedTotal)}</strong></div>
          </div>
        </article>
      `;
    }

    function renderComparison(suiteCalc, wholeCalc, selectedTypeForResult) {
      return `
        <div class="compare-column">
          <div class="compare-label">左側：獨立套房<span>套房標準</span></div>
          ${renderCard(suiteCalc, selectedTypeForResult)}
        </div>
        <div class="compare-column">
          <div class="compare-label">右側：整層住宅<span>整層（戶）標準</span></div>
          ${renderCard(wholeCalc, selectedTypeForResult)}
        </div>
      `;
    }

    function render() {
      hasSubmittedResult = true;
      const type = selectedType();
      const area = getNumber("area");
      const rent = getNumber("rent");
      const actualUnit = area > 0 ? rent / area : NaN;
      const normal = calcFor(type);
      const alternate = calcFor(type === "whole" ? "suite" : "whole");

      $("equipmentValue").value = equipmentValue(type);

      if (!normal) {
        $("statusTitle").textContent = "找不到租金單價";
        $("statusDesc").textContent = "請確認縣市、行政區、案件類型和權狀坪數。";
        return;
      }

      const decision = chooseStandard(normal, alternate, type, area);
      const selected = decision.selected;
      const overReceiveCap = rent > normal.receiveCap;
      const overAllowed = rent > selected.allowedTotal;

      $("modeBadge").textContent = decision.mode;
      $("actualUnit").textContent = unit(actualUnit);
      $("baseRate").textContent = unit(normal.rate);
      $("allowedTotal").textContent = money(selected.allowedTotal);
      $("plannedRent").textContent = money(rent);
      $("comparison").innerHTML = renderComparison(calcFor("suite"), calcFor("whole"), selected.type);

      const statusBox = $("statusBox");
      statusBox.className = "status";
      if (overReceiveCap) {
        statusBox.classList.add("bad");
        $("statusTitle").textContent = "已超過，不可送件";
        $("statusDesc").textContent = `本件預計簽約租金 ${money(rent)} 已超過 ${typeLabel[type]} 的縣市收件上限 ${money(normal.receiveCap)}，依 PDF 規則不收件。`;
      } else if (overAllowed) {
        statusBox.classList.add("bad");
        $("statusTitle").textContent = "已超過，不可送件";
        $("statusDesc").textContent = `本件預計簽約租金 ${money(rent)} 已高於可受理總租金 ${money(selected.allowedTotal)}，不可送件。`;
      } else if (actualUnit > normal.rate) {
        statusBox.classList.add("warn");
        $("statusTitle").textContent = "可送審，需留意加成依據";
        $("statusDesc").textContent = "實際單位租金高於原始單價參考值，需保留區位、裝修或設備佐證。";
      } else {
        statusBox.classList.add("ok");
        $("statusTitle").textContent = "未超過租金限制";
        $("statusDesc").textContent = "簽約租金未超過單價參考與總價上限。";
      }

      const notes = [
        `本案以 ${selected.label} 標準判斷，可受理總租金為 ${money(selected.allowedTotal)}。`,
        `物件地址為 ${$("city").value}${$("district").value}${$("address").value.trim()}。`,
        `實際單位租金為 ${unit(actualUnit)}，原始單價參考值為 ${unit(normal.rate)}。`,
        `設備調整值依已勾選設備自動計算，${typeLabel[type]} 上限為 ${money(type === "whole" ? DATA.equipment.wholeMax : DATA.equipment.suiteMax)}。`,
      ];
      if (decision.flexible) {
        notes.push("因整層住宅未滿 15 坪，或獨立套房達 15 坪以上，已啟用雙軌彈性認定並取較高上限。");
      }
      $("ruleNotes").innerHTML = notes.map((note) => `<li>${note}</li>`).join("");
    }

    function resetResult(title = "待送出", desc = "請填寫物件資料後按送出，系統才會產生判斷結果。") {
      hasSubmittedResult = false;
      $("modeBadge").textContent = "尚未送出";
      $("statusBox").className = "status";
      $("statusTitle").textContent = title;
      $("statusDesc").textContent = desc;
      $("actualUnit").textContent = "-";
      $("baseRate").textContent = "-";
      $("allowedTotal").textContent = "-";
      $("plannedRent").textContent = "-";
      $("comparison").innerHTML = "";
      $("ruleNotes").innerHTML = "<li>送出後會依縣市、行政區、案件類型、坪數、屋齡、區位、裝修與設備產生明細。</li>";
    }

    function validateRequiredFields() {
      const missing = [];
      if (!selectedType()) missing.push("案件類型");
      if (!$("city").value) missing.push("縣市");
      if (!$("district").value) missing.push("行政區");
      if (!$("address").value.trim()) missing.push("詳細地址");
      if (getNumber("area") <= 0) missing.push("權狀坪數");
      if (getNumber("rent") <= 0) missing.push("簽約租金總價");
      if ($("age").value === "" || Number($("age").value) < 0) missing.push("屋齡");
      if ($("location").value === "") missing.push("案件地點等級");
      if ($("renovation").value === "") missing.push("裝潢等級");
      return missing;
    }

    function handleSubmit(event) {
      event.preventDefault();
      updateEquipmentValue();
      const missing = validateRequiredFields();
      if (missing.length) {
        resetResult("資料尚未完整", `請先補齊：${missing.join("、")}。`);
        $("statusBox").classList.add("bad");
        return;
      }
      render();
    }

    function populateSelects() {
      $("sourceText").textContent = `${DATA.source.version}`;

      const cities = unique(DATA.rows.map((row) => row.city));
      $("city").innerHTML = `<option value="">請選擇縣市</option>` + cities.map((city) => `<option value="${city}">${city}</option>`).join("");

      $("location").innerHTML = DATA.locationAdjustments
        .map((item) => `<option value="${item.rate}">${item.label}（${percent(item.rate)}）</option>`)
        .join("");
      $("location").innerHTML = `<option value="">請選擇等級</option>` + $("location").innerHTML;

      $("renovation").innerHTML = DATA.renovationAdjustments
        .map((item) => `<option value="${item.rate}">${item.label}（${percent(item.rate)}）</option>`)
        .join("");
      $("renovation").innerHTML = `<option value="">請選擇等級</option>` + $("renovation").innerHTML;

      $("equipmentList").innerHTML = DATA.equipment.items.map((item, index) => `
        <label>
          <input data-equipment type="checkbox" value="${item}">
          <span>${item}</span>
        </label>
      `).join("");

      populateDistricts();
      resetResult();
    }

    function populateDistricts() {
      const city = $("city").value;
      const districts = unique(DATA.rows.filter((row) => row.city === city).map((row) => row.district));
      $("district").innerHTML = `<option value="">請選擇行政區</option>` + districts.map((district) => `<option value="${district}">${district}</option>`).join("");
      resetResult();
    }

    function clearForm() {
      $("address").value = "";
      $("area").value = "";
      $("rent").value = "";
      $("age").value = "";
      $("equipmentValue").value = "";
      $("city").value = "";
      populateDistricts();
      $("location").value = "";
      $("renovation").value = "";
      document.querySelectorAll('input[name="type"]').forEach((input) => {
        input.checked = false;
      });
      document.querySelectorAll("[data-equipment]").forEach((input) => {
        input.checked = false;
      });
      resetResult();
    }

    async function copySummary() {
      if (!hasSubmittedResult) {
        const toast = $("toast");
        toast.textContent = "請先送出產生判斷結果";
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 1600);
        return;
      }
      const text = [
        `物件：${$("city").value}${$("district").value}${$("address").value.trim()}，${typeLabel[selectedType()]}，${getNumber("area")} 坪，屋齡 ${getNumber("age")} 年`,
        `簽約租金：${money(getNumber("rent"))}`,
        `判斷：${$("statusTitle").textContent}`,
        `可受理總租金：${$("allowedTotal").textContent}`,
        `實際單位租金：${$("actualUnit").textContent}`,
      ].join("\n");
      await navigator.clipboard.writeText(text);
      const toast = $("toast");
      toast.textContent = "已複製";
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1600);
    }

    populateSelects();

    $("city").addEventListener("change", populateDistricts);
    $("rentForm").addEventListener("submit", handleSubmit);
    $("rentForm").addEventListener("input", () => {
      updateEquipmentValue();
      if (hasSubmittedResult) resetResult("資料已變更", "請重新按送出產生最新判斷結果。");
    });
    $("rentForm").addEventListener("change", () => {
      updateEquipmentValue();
      if (hasSubmittedResult) resetResult("資料已變更", "請重新按送出產生最新判斷結果。");
    });
    $("clearBtn").addEventListener("click", clearForm);
    $("copyBtn").addEventListener("click", copySummary);
    $("printBtn").addEventListener("click", () => window.print());
  </script>
</body>
</html>
