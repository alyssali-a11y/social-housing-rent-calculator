<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>社宅五期租金試算</title>
  <script src="./rent-data.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-2: #f9fafb;
      --text: #172033;
      --muted: #667085;
      --line: #d9dee7;
      --primary: #175cd3;
      --primary-soft: #eff6ff;
      --ok: #067647;
      --ok-soft: #ecfdf3;
      --warn: #b54708;
      --warn-soft: #fffaeb;
      --bad: #b42318;
      --bad-soft: #fef3f2;
      --shadow: 0 10px 30px rgba(16, 24, 40, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      line-height: 1.55;
      overflow-x: hidden;
    }

    button, input, select {
      font: inherit;
    }

    .app {
      width: 100%;
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px;
      overflow-x: hidden;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .topbar > * {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .source {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .btn {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      padding: 8px 12px;
      cursor: pointer;
      transition: .16s ease;
    }

    .btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .btn.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
      font-weight: 700;
    }

    .btn.primary:hover {
      color: #fff;
      filter: brightness(.96);
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(360px, 520px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      min-width: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    .panel-body {
      padding: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    fieldset.field {
      min-width: 0;
      margin: 0;
      padding: 0;
      border: 0;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label,
    legend {
      color: #344054;
      font-size: 14px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid #cfd6e2;
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 9px 11px;
      outline: none;
    }

    input:focus,
    select:focus,
    button:focus-visible {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(23, 92, 211, .18);
    }

    .segmented {
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .segmented input,
    .check-list input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .segmented span,
    .check-list span {
      display: grid;
      place-items: center;
      min-height: 44px;
      min-width: 0;
      border: 1px solid #cfd6e2;
      border-radius: 8px;
      background: #fff;
      color: #344054;
      cursor: pointer;
      transition: .16s ease;
    }

    .segmented input:checked + span,
    .check-list input:checked + span {
      border-color: var(--primary);
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 700;
    }

    .check-list {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    .doc-reader {
      border: 1px dashed #b8c4d6;
      border-radius: 8px;
      background: #f8fbff;
      padding: 14px;
    }

    .doc-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .doc-actions input[type="file"] {
      position: absolute;
      inline-size: 1px;
      block-size: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .upload-button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 8px 12px;
      cursor: pointer;
      transition: .16s ease;
    }

    .upload-button:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .ocr-status {
      margin-top: 10px;
      color: #344054;
      font-size: 14px;
    }

    .ocr-preview {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .ocr-preview img {
      width: 100%;
      max-height: 220px;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .ocr-candidates {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .ocr-fields {
      display: grid;
      gap: 6px;
      margin-top: 10px;
      padding: 10px 12px;
      border: 1px solid #d9e4f2;
      border-radius: 8px;
      background: #fff;
      color: #344054;
      font-size: 13px;
    }

    .ocr-fields strong {
      color: var(--text);
    }

    .candidate-btn {
      min-height: 40px;
      border: 1px solid #b8c4d6;
      border-radius: 8px;
      background: #fff;
      color: #344054;
      padding: 8px 10px;
      cursor: pointer;
      text-align: left;
    }

    .candidate-btn:hover,
    .candidate-btn.active {
      border-color: var(--primary);
      background: var(--primary-soft);
      color: var(--primary);
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      grid-column: 1 / -1;
      padding-top: 4px;
    }

    .status {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      align-items: center;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      margin-bottom: 16px;
    }

    .status.ok { background: var(--ok-soft); border-color: #abefc6; }
    .status.warn { background: var(--warn-soft); border-color: #fedf89; }
    .status.bad { background: var(--bad-soft); border-color: #fecdca; }

    .status h2 {
      margin: 0;
      font-size: 22px;
    }

    .status p {
      margin: 2px 0 0;
      color: var(--muted);
    }

    .badge {
      border-radius: 999px;
      padding: 6px 10px;
      background: #fff;
      border: 1px solid var(--line);
      font-weight: 700;
      white-space: nowrap;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .metric {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      min-height: 92px;
    }

    .metric small {
      display: block;
      color: var(--muted);
      font-weight: 700;
    }

    .metric strong {
      display: block;
      margin-top: 8px;
      font-size: 22px;
      font-variant-numeric: tabular-nums;
      overflow-wrap: anywhere;
    }

    .split {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .compare-column {
      min-width: 0;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .compare-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #344054;
      font-size: 14px;
      font-weight: 700;
    }

    .compare-label span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .calc-card {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .calc-card.active {
      border-color: var(--primary);
      box-shadow: inset 4px 0 0 var(--primary);
    }

    .calc-card h3 {
      margin: 0;
      padding: 12px 14px;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
      font-size: 16px;
    }

    .rows {
      padding: 10px 14px 14px;
    }

    .line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, auto);
      gap: 12px;
      padding: 7px 0;
      border-bottom: 1px solid #eef1f5;
      min-width: 0;
    }

    .line:last-child {
      border-bottom: 0;
    }

    .line span:first-child {
      color: var(--muted);
    }

    .line strong {
      font-variant-numeric: tabular-nums;
      overflow-wrap: anywhere;
      text-align: right;
    }

    .notes {
      margin-top: 14px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #344054;
    }

    .notes ul {
      margin: 8px 0 0;
      padding-left: 20px;
    }

    .notes li + li {
      margin-top: 4px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: .2s ease;
      background: #172033;
      color: #fff;
      border-radius: 8px;
      padding: 10px 12px;
      box-shadow: var(--shadow);
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1100px) {
      .grid,
      .split {
        grid-template-columns: 1fr;
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .app {
        padding: 14px;
      }

      .topbar,
      .status {
        display: grid;
      }

      .form-grid,
      .metrics,
      .check-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>社宅五期租金試算</h1>
        <p class="source" id="sourceText"></p>
      </div>
      <div class="actions">
        <button class="btn" id="clearBtn" type="button">清空</button>
        <button class="btn" id="copyBtn" type="button">複製明細</button>
        <button class="btn" id="printBtn" type="button">列印</button>
      </div>
    </header>

    <section class="grid">
      <form class="panel" id="rentForm">
        <div class="panel-header">
          <h2 class="panel-title">物件資料</h2>
        </div>
        <div class="panel-body">
          <div class="form-grid">
            <fieldset class="field full doc-reader">
              <legend>上傳權狀或一類謄本辨識</legend>
              <div class="doc-actions">
                <label class="upload-button" for="documentFile">上傳權狀或謄本</label>
                <input id="documentFile" type="file" accept="image/*,application/pdf">
                <label class="upload-button" for="cameraFile">拍照辨識</label>
                <input id="cameraFile" type="file" accept="image/*" capture="environment">
                <button class="btn" id="runOcrBtn" type="button">開始辨識</button>
              </div>
              <p class="hint">辨識後會嘗試帶入縣市、行政區、詳細地址、屋齡與面積；所有欄位仍可手動修改。</p>
              <div class="ocr-status" id="ocrStatus">尚未選擇檔案。</div>
              <div class="ocr-preview" id="ocrPreview" hidden>
                <img id="ocrImagePreview" alt="上傳文件預覽" hidden>
                <div class="ocr-fields" id="ocrFields" hidden></div>
                <div class="ocr-candidates" id="ocrCandidates"></div>
              </div>
            </fieldset>
            <fieldset class="field">
              <legend>案件類型</legend>
              <div class="segmented">
                <label><input type="radio" name="type" value="whole"><span>整層住宅</span></label>
                <label><input type="radio" name="type" value="suite"><span>獨立套房</span></label>
              </div>
            </fieldset>
            <div class="field">
              <label for="city">縣市</label>
              <select id="city"></select>
            </div>
            <div class="field">
              <label for="district">行政區</label>
              <select id="district"></select>
            </div>
            <div class="field full">
              <label for="address">詳細地址</label>
              <input id="address" autocomplete="street-address" placeholder="請輸入路段、巷弄、門牌、樓層">
            </div>
            <div class="field">
              <label for="areaSqm">權狀面積（平方公尺）</label>
              <input id="areaSqm" type="number" min="0" step="0.01" placeholder="例如 87.83">
              <p class="hint">1 平方公尺 = 0.3025 坪，輸入後會自動換算。</p>
            </div>
            <div class="field">
              <label for="area">換算坪數</label>
              <input id="area" type="number" min="0" step="0.01" placeholder="例如 26.57">
              <p class="hint" id="areaConvertHint">也可直接輸入坪數，系統會同步換算平方公尺。</p>
            </div>
            <div class="field">
              <label for="rent">簽約租金總價</label>
              <input id="rent" type="number" min="0" step="1">
            </div>
            <div class="field">
              <label for="age">屋齡</label>
              <input id="age" type="number" min="0" step="1">
            </div>
            <div class="field">
              <label for="location">案件地點等級</label>
              <select id="location"></select>
            </div>
            <div class="field">
              <label for="renovation">裝潢等級</label>
              <select id="renovation"></select>
            </div>
            <div class="field">
              <label for="equipmentValue">設備調整值</label>
              <input id="equipmentValue" type="number" min="0" step="100" readonly>
            </div>
            <fieldset class="field full">
              <legend>優質設備</legend>
              <div class="check-list" id="equipmentList"></div>
              <p class="hint">每項以 500 元估算，整層住宅最高 2,000 元，獨立套房最高 1,000 元。</p>
            </fieldset>
            <div class="form-actions">
              <button class="btn primary" type="submit">送出</button>
            </div>
          </div>
        </div>
      </form>

      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title">判斷結果</h2>
          <span class="badge" id="modeBadge">一般審查</span>
        </div>
        <div class="panel-body">
          <div class="status" id="statusBox">
            <div>
              <h2 id="statusTitle">待輸入</h2>
              <p id="statusDesc"></p>
            </div>
          </div>

          <div class="metrics">
            <div class="metric">
              <small>實際單位租金</small>
              <strong id="actualUnit">-</strong>
            </div>
            <div class="metric">
              <small>原始單價參考值</small>
              <strong id="baseRate">-</strong>
            </div>
            <div class="metric">
              <small>可受理總租金</small>
              <strong id="allowedTotal">-</strong>
            </div>
            <div class="metric">
              <small>本件預計簽約租金</small>
              <strong id="plannedRent">-</strong>
            </div>
          </div>

          <div class="split" id="comparison"></div>

          <div class="notes">
            <strong>審查邏輯</strong>
            <ul id="ruleNotes"></ul>
          </div>
        </div>
      </section>
    </section>
  </main>

  <div class="toast" id="toast">已複製</div>

  <script>
    const DATA = window.RENT_DATA;
    const $ = (id) => document.getElementById(id);
    const money = (value) => Number.isFinite(value) ? `${Math.round(value).toLocaleString("zh-TW")} 元` : "-";
    const unit = (value) => Number.isFinite(value) ? `${Math.round(value).toLocaleString("zh-TW")} 元／坪` : "-";
    const percent = (value) => `${Math.round(value * 100)}%`;
    const typeLabel = { whole: "整層住宅", suite: "獨立套房" };
    const SQM_TO_PING = 0.3025;
    let hasSubmittedResult = false;
    let isSyncingArea = false;
    let selectedDocumentFile = null;
    let previewObjectUrl = "";

    function unique(list) {
      return [...new Set(list)];
    }

    function selectedType() {
      return document.querySelector('input[name="type"]:checked')?.value || "";
    }

    function getNumber(id) {
      return Number($(id).value) || 0;
    }

    function decimal(value, digits = 2) {
      return Number.isFinite(value) ? Number(value.toFixed(digits)).toString() : "";
    }

    function setAreaValues({ sqm, ping, source = "" }) {
      isSyncingArea = true;
      const nextSqm = Number.isFinite(sqm) ? sqm : (Number.isFinite(ping) ? ping / SQM_TO_PING : 0);
      const nextPing = Number.isFinite(ping) ? ping : (Number.isFinite(sqm) ? sqm * SQM_TO_PING : 0);
      $("areaSqm").value = nextSqm > 0 ? decimal(nextSqm) : "";
      $("area").value = nextPing > 0 ? decimal(nextPing) : "";
      isSyncingArea = false;
      $("areaConvertHint").textContent = source
        ? `已由${source}帶入：${decimal(nextSqm)} 平方公尺，換算 ${decimal(nextPing)} 坪。`
        : "也可直接輸入坪數，系統會同步換算平方公尺。";
      if (hasSubmittedResult) resetResult("面積已變更", "請重新按送出產生最新判斷結果。");
    }

    function syncAreaFromSqm() {
      if (isSyncingArea) return;
      const sqm = getNumber("areaSqm");
      isSyncingArea = true;
      $("area").value = sqm > 0 ? decimal(sqm * SQM_TO_PING) : "";
      isSyncingArea = false;
      $("areaConvertHint").textContent = "已依平方公尺自動換算坪數。";
      if (hasSubmittedResult) resetResult("面積已變更", "請重新按送出產生最新判斷結果。");
    }

    function syncAreaFromPing() {
      if (isSyncingArea) return;
      const ping = getNumber("area");
      isSyncingArea = true;
      $("areaSqm").value = ping > 0 ? decimal(ping / SQM_TO_PING) : "";
      isSyncingArea = false;
      $("areaConvertHint").textContent = "已依坪數自動換算平方公尺。";
      if (hasSubmittedResult) resetResult("面積已變更", "請重新按送出產生最新判斷結果。");
    }

    function ageKeyFor(row, age) {
      const keys = Object.keys(row.rates);
      if (age >= 40) return "40+";
      if (age >= 35 && keys.includes("35-40")) return "35-40";
      if (age >= 30 && keys.includes("30-35")) return "30-35";
      if (age >= 30 && keys.includes("30-40")) return "30-40";
      if (age >= 25) return "25-30";
      if (age >= 20) return "20-25";
      if (age >= 15) return "15-20";
      if (age >= 10) return "10-15";
      if (age >= 5) return "5-10";
      return "0-5";
    }

    function capFor(city, type) {
      const caps = DATA.cityCaps[city] || DATA.cityCaps["其他縣市"];
      return caps[type];
    }

    function findRow(city, district, type) {
      return DATA.rows.find((row) => row.city === city && row.district === district && row.buildingType === type)
        || DATA.rows.find((row) => row.city === city && row.district === "其他" && row.buildingType === type);
    }

    function equipmentValue(type) {
      if (!type) return 0;
      const count = [...document.querySelectorAll("[data-equipment]:checked")].length;
      const max = type === "whole" ? DATA.equipment.wholeMax : DATA.equipment.suiteMax;
      return Math.min(count * 500, max);
    }

    function updateEquipmentValue() {
      const type = selectedType();
      $("equipmentValue").value = type ? equipmentValue(type) : "";
    }

    function calcFor(type) {
      const city = $("city").value;
      const district = $("district").value;
      const area = getNumber("area");
      const age = getNumber("age");
      const locationRate = Number($("location").value);
      const renovationRate = Number($("renovation").value);
      const row = findRow(city, district, type);
      if (!row || area <= 0) return null;

      const bucket = ageKeyFor(row, age);
      const rate = row.rates[bucket];
      const base = rate * area;
      const locationAdd = base * locationRate;
      const renovationAdd = base * renovationRate;
      const equipmentAdd = equipmentValue(type);
      const calculated = Math.round(base + locationAdd + renovationAdd + equipmentAdd);
      const receiveCap = capFor(city, type);
      const allowedTotal = Math.min(calculated, receiveCap);
      const allowedUnit = allowedTotal / area;

      return {
        type,
        label: typeLabel[type],
        row,
        bucket,
        rate,
        base,
        locationRate,
        locationAdd,
        renovationRate,
        renovationAdd,
        equipmentAdd,
        calculated,
        receiveCap,
        allowedTotal,
        allowedUnit,
      };
    }

    function shouldUseFlexible(type, area) {
      return (type === "whole" && area > 0 && area < 15) || (type === "suite" && area >= 15);
    }

    function chooseStandard(normal, alternate, type, area) {
      if (!shouldUseFlexible(type, area) || !alternate) {
        return { selected: normal, mode: "一般審查", flexible: false };
      }
      const selected = alternate.allowedTotal > normal.allowedTotal ? alternate : normal;
      return { selected, mode: "彈性認定", flexible: true };
    }

    function renderCard(calc, selectedTypeForResult) {
      if (!calc) return "";
      const active = calc.type === selectedTypeForResult ? " active" : "";
      return `
        <article class="calc-card${active}">
          <h3>${calc.label}計算明細</h3>
          <div class="rows">
            <div class="line"><span>租金基數</span><strong>每坪 ${calc.rate.toLocaleString("zh-TW")} × ${getNumber("area").toFixed(2)} 坪 = ${money(calc.base)}</strong></div>
            <div class="line"><span>區位加乘</span><strong>${money(calc.base)} × ${percent(calc.locationRate)} = ${money(calc.locationAdd)}</strong></div>
            <div class="line"><span>裝修加乘</span><strong>${money(calc.base)} × ${percent(calc.renovationRate)} = ${money(calc.renovationAdd)}</strong></div>
            <div class="line"><span>優質設備</span><strong>${money(calc.equipmentAdd)}</strong></div>
            <div class="line"><span>單價計算上限</span><strong>${money(calc.calculated)}</strong></div>
            <div class="line"><span>總價收件上限</span><strong>${money(calc.receiveCap)}</strong></div>
            <div class="line"><span>${calc.label}租金上限</span><strong>${money(calc.allowedTotal)}</strong></div>
          </div>
        </article>
      `;
    }

    function renderComparison(suiteCalc, wholeCalc, selectedTypeForResult) {
      return `
        <div class="compare-column">
          <div class="compare-label">左側：獨立套房<span>套房標準</span></div>
          ${renderCard(suiteCalc, selectedTypeForResult)}
        </div>
        <div class="compare-column">
          <div class="compare-label">右側：整層住宅<span>整層（戶）標準</span></div>
          ${renderCard(wholeCalc, selectedTypeForResult)}
        </div>
      `;
    }

    function render() {
      hasSubmittedResult = true;
      const type = selectedType();
      const area = getNumber("area");
      const rent = getNumber("rent");
      const actualUnit = area > 0 ? rent / area : NaN;
      const normal = calcFor(type);
      const alternate = calcFor(type === "whole" ? "suite" : "whole");

      $("equipmentValue").value = equipmentValue(type);

      if (!normal) {
        $("statusTitle").textContent = "找不到租金單價";
        $("statusDesc").textContent = "請確認縣市、行政區、案件類型和權狀坪數。";
        return;
      }

      const decision = chooseStandard(normal, alternate, type, area);
      const selected = decision.selected;
      const overReceiveCap = rent > normal.receiveCap;
      const overAllowed = rent > selected.allowedTotal;

      $("modeBadge").textContent = decision.mode;
      $("actualUnit").textContent = unit(actualUnit);
      $("baseRate").textContent = unit(normal.rate);
      $("allowedTotal").textContent = money(selected.allowedTotal);
      $("plannedRent").textContent = money(rent);
      $("comparison").innerHTML = renderComparison(calcFor("suite"), calcFor("whole"), selected.type);

      const statusBox = $("statusBox");
      statusBox.className = "status";
      if (overReceiveCap) {
        statusBox.classList.add("bad");
        $("statusTitle").textContent = "已超過，不可送件";
        $("statusDesc").textContent = `本件預計簽約租金 ${money(rent)} 已超過 ${typeLabel[type]} 的縣市收件上限 ${money(normal.receiveCap)}，依 PDF 規則不收件。`;
      } else if (overAllowed) {
        statusBox.classList.add("bad");
        $("statusTitle").textContent = "已超過，不可送件";
        $("statusDesc").textContent = `本件預計簽約租金 ${money(rent)} 已高於可受理總租金 ${money(selected.allowedTotal)}，不可送件。`;
      } else if (actualUnit > normal.rate) {
        statusBox.classList.add("warn");
        $("statusTitle").textContent = "可送審，需留意加成依據";
        $("statusDesc").textContent = "實際單位租金高於原始單價參考值，需保留區位、裝修或設備佐證。";
      } else {
        statusBox.classList.add("ok");
        $("statusTitle").textContent = "未超過租金限制";
        $("statusDesc").textContent = "簽約租金未超過單價參考與總價上限。";
      }

      const notes = [
        `本案以 ${selected.label} 標準判斷，可受理總租金為 ${money(selected.allowedTotal)}。`,
        `物件地址為 ${$("city").value}${$("district").value}${$("address").value.trim()}。`,
        `實際單位租金為 ${unit(actualUnit)}，原始單價參考值為 ${unit(normal.rate)}。`,
        `設備調整值依已勾選設備自動計算，${typeLabel[type]} 上限為 ${money(type === "whole" ? DATA.equipment.wholeMax : DATA.equipment.suiteMax)}。`,
      ];
      if (decision.flexible) {
        notes.push("因整層住宅未滿 15 坪，或獨立套房達 15 坪以上，已啟用雙軌彈性認定並取較高上限。");
      }
      $("ruleNotes").innerHTML = notes.map((note) => `<li>${note}</li>`).join("");
    }

    function normalizeOcrText(text) {
      const fullWidth = "０１２３４５６７８９．";
      const halfWidth = "0123456789.";
      return text
        .replace(/[０-９．]/g, (char) => halfWidth[fullWidth.indexOf(char)] || char)
        .replace(/[,，]/g, "")
        .replace(/\s+/g, " ");
    }

    function addAreaCandidate(map, value, unitType, score, source) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric) || numeric <= 0) return;
      const sqm = unitType === "sqm" ? numeric : numeric / SQM_TO_PING;
      const ping = unitType === "ping" ? numeric : numeric * SQM_TO_PING;
      if (sqm < 3 || sqm > 1000 || ping < 1 || ping > 300) return;
      const key = Math.round(ping * 100);
      const current = map.get(key);
      const next = { sqm, ping, score, source };
      if (!current || next.score > current.score) map.set(key, next);
    }

    function parseAreaCandidates(text) {
      const normalized = normalizeOcrText(text);
      const candidates = new Map();
      const sqmUnitPattern = /([0-9]+(?:\.[0-9]+)?)\s*(?:平方公尺|平方|㎡|m²|m2|M2|平方米)/g;
      const pingUnitPattern = /([0-9]+(?:\.[0-9]+)?)\s*坪/g;
      const contextPattern = /(總面積|建物面積|權狀面積|登記面積|合計|主建物|附屬建物|共有部分)[^0-9]{0,18}([0-9]+(?:\.[0-9]+)?)/g;

      for (const match of normalized.matchAll(sqmUnitPattern)) {
        addAreaCandidate(candidates, match[1], "sqm", 88, "平方公尺欄位");
      }
      for (const match of normalized.matchAll(pingUnitPattern)) {
        addAreaCandidate(candidates, match[1], "ping", 84, "坪數欄位");
      }
      for (const match of normalized.matchAll(contextPattern)) {
        const keyword = match[1];
        const score = /總面積|建物面積|權狀面積|登記面積|合計/.test(keyword) ? 96 : 58;
        addAreaCandidate(candidates, match[2], "sqm", score, keyword);
      }

      return [...candidates.values()]
        .sort((a, b) => b.score - a.score || b.sqm - a.sqm)
        .slice(0, 8);
    }

    function compactText(text) {
      return normalizeOcrText(text).replace(/\s+/g, "");
    }

    function placeVariants(name) {
      return unique([name, name.replace(/臺/g, "台"), name.replace(/台/g, "臺")]);
    }

    function includesPlace(text, name) {
      return placeVariants(name).some((variant) => text.includes(variant));
    }

    function detectCity(text) {
      const compact = compactText(text);
      const cities = unique(DATA.rows.map((row) => row.city)).sort((a, b) => b.length - a.length);
      return cities.find((city) => includesPlace(compact, city)) || "";
    }

    function districtsForCity(city) {
      return unique(DATA.rows
        .filter((row) => !city || row.city === city)
        .map((row) => row.district)
        .filter((district) => district && district !== "其他"))
        .sort((a, b) => b.length - a.length);
    }

    function detectDistrict(text, city) {
      const compact = compactText(text);
      return districtsForCity(city).find((district) => includesPlace(compact, district)) || "";
    }

    function cleanAddressSegment(segment, city, district) {
      let clean = segment
        .replace(/^(?:建物門牌|建物地址|房屋門牌|門牌地址|門牌|地址|坐落|建物坐落)[:：]?/, "")
        .replace(/^(?:土地坐落|基地坐落|建號|地號)[:：]?/, "")
        .replace(/[，,。；;].*$/, "");
      placeVariants(city).forEach((variant) => {
        clean = clean.replace(variant, "");
      });
      placeVariants(district).forEach((variant) => {
        clean = clean.replace(variant, "");
      });
      clean = clean.replace(/^(?:詳如|以下|：|:)+/, "").trim();
      const stop = clean.search(/(?:主要用途|用途|層次|總面積|建物面積|權利範圍|登記日期|所有權人|建築完成|權狀|謄本|地號|建號)/);
      if (stop >= 0) clean = clean.slice(0, stop);
      const numberEnd = clean.search(/號/);
      if (numberEnd >= 0) clean = clean.slice(0, Math.min(clean.length, numberEnd + 12));
      return clean.slice(0, 80);
    }

    function extractAddress(text, city, district) {
      const compact = compactText(text);
      const labelMatch = compact.match(/(?:建物門牌|建物地址|房屋門牌|門牌地址|門牌|地址)[:：]?(.{4,100})/);
      if (labelMatch) {
        const byLabel = cleanAddressSegment(labelMatch[1], city, district);
        if (byLabel) return byLabel;
      }

      const cityVariant = placeVariants(city).find((variant) => compact.includes(variant));
      if (!cityVariant) return "";
      const cityIndex = compact.indexOf(cityVariant);
      const segment = compact.slice(cityIndex, cityIndex + 110);
      return cleanAddressSegment(segment, city, district);
    }

    function rocYearToAd(year) {
      const numeric = Number(year);
      if (!Number.isFinite(numeric) || numeric <= 0) return NaN;
      return numeric < 1911 ? numeric + 1911 : numeric;
    }

    function calculateAgeFromDate(year, month = 1, day = 1) {
      const adYear = rocYearToAd(year);
      const current = new Date();
      if (!Number.isFinite(adYear) || adYear < 1900 || adYear > current.getFullYear()) return "";
      let age = current.getFullYear() - adYear;
      const numericMonth = Number(month) || 1;
      const numericDay = Number(day) || 1;
      if (current.getMonth() + 1 < numericMonth || (current.getMonth() + 1 === numericMonth && current.getDate() < numericDay)) {
        age -= 1;
      }
      return String(Math.max(0, age));
    }

    function extractAge(text) {
      const normalized = normalizeOcrText(text);
      const completeDate = normalized.match(/(?:建築完成日期|建築完成日|建築完成|完工日期|完工日)[^0-9]{0,12}([0-9]{2,4})[年./\- ]{1,3}([0-9]{1,2})[月./\- ]{0,3}([0-9]{1,2})?/);
      if (completeDate) return calculateAgeFromDate(completeDate[1], completeDate[2], completeDate[3]);
      const yearOnly = normalized.match(/(?:建築完成日期|建築完成日|建築完成|完工日期|完工日)[^0-9]{0,12}([0-9]{2,4})/);
      if (yearOnly) return calculateAgeFromDate(yearOnly[1]);
      return "";
    }

    function detectPropertyFields(text) {
      const city = detectCity(text);
      const district = detectDistrict(text, city);
      return {
        city,
        district,
        address: extractAddress(text, city, district),
        age: extractAge(text),
      };
    }

    }

    function ensurePdfJs() {
      if (!window.pdfjsLib) throw new Error("PDF 辨識套件尚未載入，請稍後再試，或改上傳圖片。");
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      return window.pdfjsLib;
    }

    function ensureTesseract() {
      if (!window.Tesseract?.recognize) throw new Error("OCR 套件尚未載入，請稍後再試，或先手動輸入面積。");
      return window.Tesseract;
    }

    async function extractPdfText(file) {
      const pdfjsLib = ensurePdfJs();
      const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
      const pageCount = Math.min(pdf.numPages, 4);
      const textParts = [];
      for (let pageNumber = 1; pageNumber <= pageCount; pageNumber += 1) {
        $("ocrStatus").textContent = `正在讀取 PDF 第 ${pageNumber} 頁文字...`;
        const page = await pdf.getPage(pageNumber);
        const content = await page.getTextContent();
        textParts.push(content.items.map((item) => item.str).join(" "));
      }
      return textParts.join("\n");
    }

    async function recognizeImage(source, label) {
      const Tesseract = ensureTesseract();
      const result = await Tesseract.recognize(source, "chi_tra+eng", {
        logger: (message) => {
          if (message.status === "recognizing text") {
            $("ocrStatus").textContent = `${label}辨識中：${Math.round((message.progress || 0) * 100)}%`;
          }
        },
      });
      return result.data.text || "";
    }

    async function recognizePdfImages(file) {
      const pdfjsLib = ensurePdfJs();
      const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
      const pageCount = Math.min(pdf.numPages, 2);
      const textParts = [];
      for (let pageNumber = 1; pageNumber <= pageCount; pageNumber += 1) {
        $("ocrStatus").textContent = `PDF 第 ${pageNumber} 頁影像轉換中...`;
        const page = await pdf.getPage(pageNumber);
        const viewport = page.getViewport({ scale: 2 });
        const canvas = document.createElement("canvas");
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
        textParts.push(await recognizeImage(canvas, `PDF 第 ${pageNumber} 頁`));
      }
      return textParts.join("\n");
    }

    async function recognizeDocument() {
      if (!selectedDocumentFile) {
        showToast("請先上傳或拍照");
        return;
      }
      const button = $("runOcrBtn");
      button.disabled = true;
      button.textContent = "辨識中...";
      $("ocrCandidates").innerHTML = "";
      $("ocrFields").hidden = true;
      $("ocrFields").innerHTML = "";
      $("ocrStatus").textContent = "準備辨識文件...";

      try {
        let text = "";
        if (selectedDocumentFile.type === "application/pdf") {
          text = await extractPdfText(selectedDocumentFile);
          if (!parseAreaCandidates(text).length) {
            text += "\n" + await recognizePdfImages(selectedDocumentFile);
          }
        } else if (selectedDocumentFile.type.startsWith("image/")) {
          text = await recognizeImage(selectedDocumentFile, "圖片");
        } else {
          throw new Error("檔案格式不支援，請上傳圖片或 PDF。");
        }
        applyDetectedFields(detectPropertyFields(text));
        renderOcrCandidates(parseAreaCandidates(text));
      } catch (error) {
        $("ocrStatus").textContent = error.message || "辨識失敗，請改用較清楚照片或手動輸入面積。";
      } finally {
        button.disabled = false;
        button.textContent = "開始辨識";
      }
    }

    populateSelects();

    $("city").addEventListener("change", populateDistricts);
    $("areaSqm").addEventListener("input", syncAreaFromSqm);
    $("area").addEventListener("input", syncAreaFromPing);
    $("documentFile").addEventListener("change", handleDocumentPick);
    $("cameraFile").addEventListener("change", handleDocumentPick);
    $("runOcrBtn").addEventListener("click", recognizeDocument);
    $("ocrCandidates").addEventListener("click", (event) => {
      const button = event.target.closest("[data-candidate-index]");
      if (!button) return;
      const candidates = JSON.parse($("ocrCandidates").dataset.candidates || "[]");
      const candidate = candidates[Number(button.dataset.candidateIndex)];
      if (!candidate) return;
      document.querySelectorAll(".candidate-btn").forEach((item) => item.classList.remove("active"));
      button.classList.add("active");
      applyAreaCandidate(candidate, "候選面積");
    });
    $("rentForm").addEventListener("submit", handleSubmit);
    $("rentForm").addEventListener("input", () => {
      updateEquipmentValue();
      if (hasSubmittedResult) resetResult("資料已變更", "請重新按送出產生最新判斷結果。");
    });
    $("rentForm").addEventListener("change", () => {
      updateEquipmentValue();
      if (hasSubmittedResult) resetResult("資料已變更", "請重新按送出產生最新判斷結果。");
    });
    $("clearBtn").addEventListener("click", clearForm);
    $("copyBtn").addEventListener("click", copySummary);
    $("printBtn").addEventListener("click", () => window.print());
  </script>
</body>
</html>
